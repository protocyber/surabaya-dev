version: "3.9"

services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --api.insecure=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.dev.sby.test`) || Host(`traefik.10.201.0.25.nip.io`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls=true"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.middlewares.traefik-auth.basicauth.users=admin:$$apr1$$T8JsHxFL$$/K5nBJCcfAOo4QfK2ngYI1" # admin:smg@sl
      - "traefik.http.routers.traefik.middlewares=traefik-auth"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # dashboard dev access
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/fitrah/projects/surabaya-dev/traefik/certs:/etc/traefik/certs:ro
      - /home/fitrah/projects/surabaya-dev/traefik/dynamic:/etc/traefik
    networks:
      - shared-net

networks:
  shared-net:
    name: shared-net
    driver: bridge
